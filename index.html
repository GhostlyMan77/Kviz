<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velký kvíz o 100 otázkách 💌</title>
<style>
  :root{
    --ink:#5b1a33;
    --paper:#fff3f0;
    --card:#ffffff;
    --rose:#e6447a;
    --rose-dark:#c02a5e;
    --peach:#ffd9c7;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:Georgia,'Times New Roman',serif;
    background:
      radial-gradient(circle at 15% 20%, var(--peach) 0, transparent 30%),
      radial-gradient(circle at 85% 80%, #ffd0dd 0, transparent 35%),
      var(--paper);
    color:var(--ink);
    display:flex;align-items:center;justify-content:center;
    padding:20px;overflow:hidden;
  }
  .card{
    background:var(--card);
    width:100%;max-width:480px;
    border-radius:28px;
    padding:36px 28px 30px;
    box-shadow:0 18px 50px rgba(192,42,94,.18);
    text-align:center;position:relative;
    max-height:92vh;overflow-y:auto;
  }
  .counter{
    font-family:'Courier New',monospace;
    font-size:13px;letter-spacing:3px;
    color:var(--rose);text-transform:uppercase;
    margin-bottom:18px;
  }
  .counter b{font-size:16px}
  h1{
    font-size:clamp(22px,5.5vw,30px);
    line-height:1.3;
    font-weight:normal;
    font-style:italic;
    margin-bottom:26px;
  }
  .answers{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}
  .answers.grid4{display:grid;grid-template-columns:1fr 1fr}
  button{
    font-family:inherit;font-size:17px;
    padding:13px 24px;border-radius:999px;
    border:2px solid var(--ink);
    background:#fff;color:var(--ink);
    cursor:pointer;
    transition:transform .15s, background .15s, box-shadow .15s;
    touch-action:manipulation;         /* mobil: bez zpoždění a zoomu při ťukání */
    -webkit-tap-highlight-color:transparent;
  }
  button:hover{transform:translateY(-3px);background:var(--peach);box-shadow:0 6px 0 rgba(91,26,51,.15)}
  button:focus-visible{outline:3px solid var(--rose);outline-offset:3px}
  .primary{background:var(--rose);border-color:var(--rose-dark);color:#fff;font-weight:bold}
  .primary:hover{background:var(--rose-dark)}
  .progress{
    height:6px;background:#ffe1ea;border-radius:99px;
    margin-top:30px;overflow:hidden;
  }
  .progress span{
    display:block;height:100%;width:0;
    background:linear-gradient(90deg,var(--rose),#ff8fb0);
    border-radius:99px;transition:width .4s ease;
  }
  .history-badge{
    display:inline-block;background:#fff0c2;border:1.5px dashed #c99a2e;color:#8a6510;
    font-size:12px;letter-spacing:2px;text-transform:uppercase;
    padding:5px 14px;border-radius:99px;margin-bottom:14px;
    font-family:'Courier New',monospace;
  }
  .history-badge.spicy{background:#ffe3e3;border-color:#d64545;color:#a32020}
  .history-badge.spicy{background:#ffe3e3;border-color:#e0484d;color:#b3272c}
  .rules{
    text-align:left;margin:0 auto 26px;max-width:380px;
    font-size:16px;line-height:1.5;
  }
  .rules li{margin-bottom:12px;list-style:none;padding-left:34px;position:relative}
  .rules li::before{position:absolute;left:0;top:0}
  .rules li:nth-child(1)::before{content:"💯"}
  .rules li:nth-child(2)::before{content:"💭"}
  .rules li:nth-child(3)::before{content:"📜"}
  .rules li:nth-child(4)::before{content:"😈"}
  .rules li:nth-child(5)::before{content:"🚩"}
  .rules li:nth-child(6)::before{content:"💌"}
  .hint{font-size:14px;color:#b06880;margin-top:14px;min-height:1.2em;font-style:italic}
  textarea{
    width:100%;min-height:150px;resize:vertical;
    font-family:inherit;font-size:16px;line-height:1.5;
    padding:14px;border-radius:16px;
    border:2px solid #ffd9e3;background:#fff7f4;color:var(--ink);
    margin-bottom:6px;
  }
  textarea:focus{outline:none;border-color:var(--rose)}
  button:disabled{
    opacity:.45;cursor:not-allowed;
    transform:none !important;box-shadow:none !important;
  }
  #essayBtn{margin-top:10px}
  #btnNe.fly{position:fixed;z-index:50;transition:left .18s ease, top .18s ease}
  .big{font-size:64px;margin-bottom:12px;animation:beat 1s infinite}
  @keyframes beat{0%,100%{transform:scale(1)}25%{transform:scale(1.15)}40%{transform:scale(1)}55%{transform:scale(1.12)}}
  .summary{
    text-align:left;background:#fff7f4;border:1.5px solid #ffd9e3;
    border-radius:16px;padding:16px;margin-top:22px;
    max-height:220px;overflow-y:auto;font-size:14px;line-height:1.6;
  }
  .summary div{border-bottom:1px dashed #ffd9e3;padding:4px 0}
  .summary div:last-child{border-bottom:none}
  .summary .odp{color:var(--rose-dark);font-weight:bold}
  .wrong h1{font-style:normal}
  .heart{
    position:fixed;top:-40px;font-size:24px;z-index:100;
    animation:fall linear forwards;pointer-events:none;
  }
  @keyframes fall{to{transform:translateY(110vh) rotate(360deg)}}
  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;transition:none !important}
  }
  /* Mobil: menší okraje, karta přes celou šířku, klávesnice nesmí nic rozbít */
  @media (max-width:480px){
    body{padding:10px;align-items:flex-start;overflow-y:auto}
    .card{padding:26px 18px 24px;max-height:none;margin-top:8px}
    button{width:100%;padding:14px 18px}
    .answers.grid4{grid-template-columns:1fr 1fr;gap:10px}
    .answers.grid4 button{font-size:15px;padding:12px 8px}
    #btnNe.fly{width:auto;padding:13px 24px}
    h1{font-size:clamp(20px,5.5vw,26px)}
  }
</style>

/* Sestavení kvízu – při každém (re)startu se běžné otázky zamíchají
   a pasti se vyberou z bank náhodně, bez opakování v jednom průchodu
   a pokud možno jiné než minule. */
const lastTrap = {};
const usedFun = new Set(); // otázky, které už v tomto sezení viděla

function pickDifferent(pool, slot){
  let q;
  do { q = pool[Math.floor(Math.random()*pool.length)]; }
  while(pool.length > 1 && q.q === lastTrap[slot]);
  lastTrap[slot] = q.q;
  return q;
}

/* Vybere pro dané sloty otázky BEZ opakování (každá max. jednou)
   a snaží se, aby na stejném slotu nebyla tatáž otázka jako minule. */
function pickSet(pool, slots){
  let chosen;
  for(let attempt = 0; attempt < 30; attempt++){
    const sh = shuffle(pool);
    chosen = slots.map((s, idx) => sh[idx]);
    if(chosen.every((q, idx) => q.q !== lastTrap[slots[idx]])) break;
  }
  slots.forEach((s, idx) => { lastTrap[s] = chosen[idx].q; });
  const map = {};
  slots.forEach((s, idx) => { map[s] = chosen[idx]; });
  return map;
}

function shuffle(arr){
  const a = arr.slice();
  for(let j = a.length-1; j > 0; j--){
    const k = Math.floor(Math.random()*(j+1));
    [a[j],a[k]] = [a[k],a[j]];
  }
  return a;
}

let quiz = [];
function buildQuiz(){
  quiz = [];
  // nejdřív otázky, které ještě neviděla; už viděné až jako záloha na konec
  const unseen = fun.filter(x => !usedFun.has(x.q));
  const seen = fun.filter(x => usedFun.has(x.q));
  const funOrdered = shuffle(unseen).concat(shuffle(seen));
  const historySlots = [10,30,50,70,90,110,130];
  const mathSlots = [20,40,60,80,120,140];
  const spicySlots = [15,35,55,75,95,115,135];
  const historyChosen = pickSet(historyPool, historySlots);
  const mathChosen = pickSet(mathPool, mathSlots);
  const spicyChosen = pickSet(spicyPool, spicySlots);
  let f = 0;
  for(let n = 1; n <= 149; n++){
    if(n === 100){
      quiz.push({...pickDifferent(bossPool, 100), trap:true});
    } else if(n === 149){
      quiz.push({
        q:"Napiš mi slohovku: <b>Co ke mně cítíš a jak to celé máš?</b>",
        qPlain:"Slohovka: Co ke mně cítíš a jak to celé máš?",
        essay:true, minSlov:90
      });
    } else if(spicyChosen[n]){
      quiz.push({...spicyChosen[n]});
    } else if(historyChosen[n]){
      quiz.push({...historyChosen[n], trap:true});
    } else if(mathChosen[n]){
      quiz.push({...mathChosen[n], trap:true});
    } else {
      quiz.push(funOrdered[f++]);
    }
  }
}

const drafts = {}; // rozepsané texty – po návratu na checkpoint nemusí psát od nuly

function pocetSlov(text){
  return text.trim().split(/\s+/).filter(Boolean).length;
}

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showEssay(item){
  const badge = item.spicy
    ? '<div class="history-badge spicy">🌶️ Pikantní otázka!</div>'
    : '<div class="history-badge">✍️ Slohová práce!</div>';
  const placeholder = item.spicy ? 'Jen se nestyď…' : 'Piš od srdce…';
  const btnText = item.spicy ? 'Odpovědět 🌶️' : 'Odevzdat slohovku 💌';
  card.innerHTML = `
    <div class="counter">Otázka <b>${i+1}</b> / 150</div>

    <h1>${item.q}</h1>
    <p style="font-size:14px;color:#b06880;font-style:italic;margin-bottom:14px">
      Minimálně <b>${item.minSlov} slov</b>. Dřív tě to dál nepustí. 😌</p>
    <textarea id="essayBox" placeholder="${placeholder}"></textarea>
    <div class="hint" id="wordCount">Napsáno: 0 / ${item.minSlov} slov</div>
    <button class="primary" id="essayBtn" disabled>${btnText}</button>
    <div class="progress"><span id="bar"></span></div>
  `;
  const box = document.getElementById('essayBox');
  const btn = document.getElementById('essayBtn');
  const wc = document.getElementById('wordCount');
  box.value = drafts[item.q] || '';

  const update = ()=>{
    const n = pocetSlov(box.value);
    wc.textContent = n >= item.minSlov
      ? 'Napsáno: ' + n + ' slov – krásné! Můžeš odevzdat ❤️'
      : 'Napsáno: ' + n + ' / ' + item.minSlov + ' slov';
    btn.disabled = n < item.minSlov;
  };
  box.addEventListener('input', update);
  update();

  btn.onclick = ()=>{
    if(pocetSlov(box.value) < item.minSlov) return;
    drafts[item.q] = box.value;
    answers.push({n: i+1, q: item.qPlain || item.q, qPlain: item.qPlain || item.q, odp: box.value.trim()});
    i++;
    showQuestion();
  };

  requestAnimationFrame(()=>{
    document.getElementById('bar').style.width = (i/150*100) + '%';
  });
}

}

function showWrong(type){
  card.classList.add('wrong');
  const cil = reachedCheckpoint
    ? 'zpátky na checkpoint – otázku <b>' + reachedCheckpoint + '</b>!'
    : 'zpátky na otázku číslo <b>1</b>!';
  const zprava = type === 'boss'
    ? 'Otázka 100… nejtěžší z celého kvízu! Ale vysoká matematika nezná slitování:<br><b>' + cil + '</b> 💀'
    : (type === 'math' ? 'Matika tě dostala' : 'Dějepis tě dostal') +
      '… Pravidla jsou pravidla:<br>' + cil;
  card.innerHTML = `
    <div class="big">😈</div>
    <h1>Špatně!</h1>
    <p style="margin-bottom:24px;line-height:1.5">${zprava}</p>
    <p style="margin-bottom:24px;font-size:14px;color:#b06880;font-style:italic">A nemysli si – otázky budou tentokrát jiné. 😏</p>
    <button class="primary" id="againBtn">Zkusit znovu 🔁</button>
  `;
  document.getElementById('againBtn').onclick = ()=>{
    card.classList.remove('wrong');
    buildQuiz(); // nové zamíchání + jiné pasti
    if(reachedCheckpoint){
      i = reachedCheckpoint - 1;
      answers = answers.filter(a => a.n < reachedCheckpoint);
    } else {
      i = 0;
      answers = [];
    }
    showQuestion();
  };
}

const neTexty = ["Ne","Určitě? 🤨","Zkus to znovu 😏","Vážně?!","Tohle tlačítko nefunguje 😇","Ani náhodou 😄","Vzdej to ❤️"];
let neIndex = 0;

function showFinal(){
  neIndex = 0;
  card.innerHTML = `
    <div class="counter">Otázka <b>150</b> / 150 💘</div>
    <h1>Budeš se mnou chodit? ❤️</h1>
    <div class="answers" id="answers"></div>
    <div class="hint" id="hint"></div>
    <div class="progress"><span style="width:100%"></span></div>
  `;
  const aEl = document.getElementById('answers');
  const hintEl = document.getElementById('hint');

  const ano = document.createElement('button');
  ano.className = 'primary';
  ano.textContent = 'Ano ❤️';
  ano.onclick = ()=>{
    answers.push({n:150, q:'Budeš se mnou chodit? ❤️', odp:'ANO! 🎉'});
    showResult();
  };

  const ne = document.createElement('button');
  ne.id = 'btnNe';
  ne.textContent = 'Ne';

  const utec = ()=>{
    ne.classList.add('fly');
    const pad = 20;
    const w = ne.offsetWidth, h = ne.offsetHeight;
    const x = pad + Math.random()*(window.innerWidth - w - pad*2);
    const y = pad + Math.random()*(window.innerHeight - h - pad*2);
    ne.style.left = x+'px';
    ne.style.top = y+'px';
    neIndex = Math.min(neIndex+1, neTexty.length-1);
    ne.textContent = neTexty[neIndex];
    ano.style.transform = 'scale(' + (1 + neIndex*0.12) + ')';
    hintEl.textContent = 'Hmm… zdá se, že jde zmáčknout jenom jedno tlačítko 🙃';
  };

  ne.addEventListener('mouseenter', utec);
  ne.addEventListener('click', utec);
  ne.addEventListener('touchstart', (e)=>{ e.preventDefault(); utec(); }, {passive:false});

  aEl.appendChild(ano);
  aEl.appendChild(ne);
}

function vysledkovyText(){
  return 'Moje odpovědi z Velkého kvízu 💌\n\n' +
    answers.map(a => a.n + '. ' + (a.qPlain || a.q) + '\n→ ' + a.odp).join('\n') +
    '\n\nOdpověď na otázku 150: ANO! ❤️';
}

function showResult(){
  const list = answers.map(a =>
    `<div><b>${a.n}.</b> ${a.qPlain || a.q}<br>→ <span class="odp">${escapeHtml(a.odp)}</span></div>`
  ).join('');

  card.innerHTML = `
    <div class="big">💖</div>
    <h1 style="font-style:normal">ANOOO! 🎉</h1>
    <p style="line-height:1.5">Věděl jsem, že správná odpověď existuje jen jedna.<br>
    Teď už zbývá poslední úkol…</p>
    <p style="margin-top:12px"><b>Pošli mi svoje odpovědi! 💌</b></p>
    <div class="answers" style="margin-top:16px" id="sendBtns"></div>
    <div class="hint" id="copyHint"></div>
    <div class="summary">${list}</div>
  `;

  const btns = document.getElementById('sendBtns');
  const hint = document.getElementById('copyHint');

  // 1) Sdílet (mobil) – otevře nabídku sdílení telefonu
  if(navigator.share){
    const shareBtn = document.createElement('button');
    shareBtn.className = 'primary';
    shareBtn.textContent = '📤 Poslat odpovědi';
    shareBtn.onclick = async ()=>{
      try{
        await navigator.share({ title:'Velký kvíz 💌', text: vysledkovyText() });
      }catch(e){ /* zavřeno uživatelem */ }
    };
    btns.appendChild(shareBtn);
  }

  // 2) WhatsApp – rovnou konverzace s autorem kvízu
  if(WHATSAPP_CISLO){
    const waBtn = document.createElement('button');
    waBtn.className = 'primary';
    waBtn.textContent = '💬 Poslat na WhatsApp';
    waBtn.onclick = ()=>{
      const url = 'https://wa.me/' + WHATSAPP_CISLO + '?text=' + encodeURIComponent(vysledkovyText());
      window.open(url, '_blank');
    };
    btns.appendChild(waBtn);
  }

  // 3) Záloha – kopírování do schránky
  const copyBtn = document.createElement('button');
  copyBtn.textContent = '📋 Zkopírovat';
  copyBtn.onclick = async ()=>{
    try{
      await navigator.clipboard.writeText(vysledkovyText());
      hint.textContent = 'Zkopírováno! Teď to vlož do zprávy 😄';
    }catch(e){
      hint.textContent = 'Nepovedlo se zkopírovat – pošli aspoň screenshot seznamu níže.';
    }
  };
  btns.appendChild(copyBtn);

  confetti();
}

function confetti(){
  const symbols = ['❤️','💖','💘','💕','🌹','✨'];
  for(let n=0;n<60;n++){
    setTimeout(()=>{
      const h = document.createElement('div');
      h.className = 'heart';
      h.textContent = symbols[Math.floor(Math.random()*symbols.length)];
      h.style.left = Math.random()*100 + 'vw';
      h.style.fontSize = (16 + Math.random()*26) + 'px';
      h.style.animationDuration = (2.5 + Math.random()*3) + 's';
      document.body.appendChild(h);
      setTimeout(()=>h.remove(), 6000);
    }, n*90);
  }
}

showIntro();
</script>
